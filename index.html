<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Rubik+Doodle+Shadow&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script defer type="module" src="./dist/script.js"></script>
</head>
<body>
    <div class="memorygame">
        <h1 class="memorygame__title">Memory Game</h1>
        <div class="playerContainer">
            <div class="playerInfo playerActive" id="player1">
                <p>Player 1</p>
                <p id="scoreplayer1">Score: 0</p>
            </div>
            <div class="playerInfo" id="player2">
                <p>Player 2</p>
                <p id="scoreplayer2">Score: 0</p>
            </div>
        </div>
        <p id="playerTime">Time Remaining: 60</p>
        <div class="gamecontainer"></div>

        <button class="resetgame">Reset</button>
    </div>
    <div class="resultcontainer">
        <p class="gameresult"></p>
        <button>Rematch</button>
    </div>
</body>
</html>
